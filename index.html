<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord and Interval Trainer</title>
<style>
    /* 1. THE SETUP */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f4f8; color: #1a202c; }
    .container { max-width: 1000px; margin: 0 auto; padding: 32px; }
    h1 { margin-top: 0; color: #2d3748; letter-spacing: -0.5px; }
    
    .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); margin-bottom: 24px; border: 1px solid #e2e8f0; }
    .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr)); gap: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    select { width: 100%; box-sizing: border-box; }
    select, button { font-size: 16px; padding: 12px 16px; border-radius: 10px; border: 1px solid #cbd5e0; transition: all 0.2s; }
    
    button { cursor: pointer; background: #ffffff; font-weight: 600; }
    button.primary { background: #3182ce; color: white; border-color: #3182ce; }
    button.danger { background: #fff5f5; color: #e53e3e; border-color: #feb2b2; font-size: 14px; padding: 8px 16px; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    
    #prompt { font-size: 28px; text-align: center; padding: 20px 20px 10px 20px; font-weight: 700; color: #2d3748; min-height: 48px; }
    
    #chordInputDisplay { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; margin: 20px 0; font-size: 32px; font-weight: 700; }
    .chord-slot { width: 56px; text-align: center; border-bottom: 4px solid #cbd5e0; color: #a0aec0; padding-bottom: 4px; transition: color 0.3s, border-color 0.3s; }
    .chord-slot.filled { border-bottom-color: #3182ce; color: #2d3748; }

    .note-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 600px; }
    .note-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    
    .note-btn { padding: 16px 4px; font-size: clamp(14px, 3.5vw, 20px); font-weight: 700; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; }
    .note-btn:hover { background: #ebf8ff; border-color: #bee3f8; }
    
    .action-btn { font-size: 16px; padding: 12px 24px; border-radius: 10px; font-weight: 600; border: 2px solid #e2e8f0; margin-top: 12px; }
    .instruction-note { font-style: italic; color: #718096; margin: 4px 0; font-size: 14px; text-align: center; line-height: 1.4; }
    .formula-note { font-weight: 600; color: #4a5568; margin-bottom: 12px; font-size: 13px; text-align: center; }

    .correct-text { color: #22c55e !important; border-bottom-color: #22c55e !important; }
    .incorrect-text { color: #ef4444 !important; border-bottom-color: #ef4444 !important; }
    
    .correct-btn { background: #f0fff4 !important; border-color: #68d391 !important; color: #22543d !important; }
    .incorrect-btn { background: #fff5f5 !important; border-color: #fc8181 !important; color: #742a2a !important; }
    
    .no-pointer { pointer-events: none; }
    .hidden { display: none !important; }

    #nextCue { text-align: center; margin-bottom: 10px; font-size: 20px; color: #3182ce; font-weight: 700; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    .score { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 16px; width: 100%; }
    .score div { background: #f7fafc; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #edf2f7; }

    @media (max-width: 600px) {
        .container { padding: 12px; }
        .note-btn { font-size: 14px; padding: 10px 2px; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header-bar"><h1>Music Theory Trainer</h1></div>

    <div class="card" id="setupCard">
        <div class="controls">
            <div>
                <label for="mode">Exercise Mode</label>
                <select id="mode">
                    <option value="build7th" selected>Build 7th Chord (No Accidentals)</option>
                    <option value="build">Build Interval (3rds)</option>
                    <option value="identify">Identify Interval (3rds)</option>
                    <option value="buildTriad">Build Triad (With Accidentals)</option>
                    <option value="buildDom">Build Dominant 7th Chord</option>
                </select>
            </div>
            <div id="difficultyGroup">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty">
                    <option value="beginner" selected>Beginner</option>
                    <option value="intermediate">Intermediate</option>
                </select>
            </div>
            <div id="directionGroup" class="hidden">
                <label for="direction">Direction</label>
                <select id="direction">
                    <option value="up">Upward</option><option value="down">Downward</option><option value="random" selected>Random</option>
                </select>
            </div>
            <div id="givenNoteGroup">
                <label for="givenNote">Given Chord Tone</label>
                <select id="givenNote">
                    <option value="Root">Root</option><option value="3rd">3rd</option><option value="5th">5th</option><option value="7th" id="opt7th">7th</option><option value="random" selected>Random</option>
                </select>
            </div>
            <div id="chordQualityGroup" class="hidden">
                <label for="chordQuality">Chord Quality</label>
                <select id="chordQuality">
                    <option value="Major">Major</option><option value="Minor">Minor</option><option value="Diminished">Diminished</option><option value="random" selected>Random</option>
                </select>
            </div>
            <div>
                <label for="sessionLength">Session Length</label>
                <select id="sessionLength">
                    <option value="10">10 Questions</option><option value="25" selected>25 Questions</option><option value="50">50 Questions</option>
                </select>
            </div>
        </div>
        <p style="margin-top:24px; color:#718096; line-height: 1.5;" id="setupInstructions"></p>
        <button class="primary" id="startBtn" style="width: 100%; margin-top: 8px;">Start Practice Session</button>
    </div>

    <div class="card hidden" id="practiceCard">
        <div class="header-bar">
            <div class="score">
                <div><span>Completed</span><strong id="completed">0</strong></div>
                <div><span>Incorrect</span><strong id="incorrect">0</strong></div>
                <div><span>Accuracy</span><strong id="accuracy">100%</strong></div>
            </div>
            <button class="danger" id="escapeBtn">Exit</button>
        </div>
        <div id="prompt"></div>
        <div id="nextCue" class="hidden">Click anywhere to continue...</div>
        <div id="chordInputDisplay" class="hidden"></div>
        <div id="answerArea" style="display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div class="card hidden" id="summaryCard">
        <div id="summary"></div>
        <button class="primary" id="restartBtn" style="width: 100%;">Return to Main Menu</button>
    </div>
</div>

<script>
const LETTERS = ['A','B','C','D','E','F','G'];
const DISPLAY_ROWS = {
    sharp: ['A#','B#','C#','D#','E#','F#','G#'],
    natural: ['A','B','C','D','E','F','G'],
    flat: ['Ab','Bb','Cb','Db','Eb','Fb','Gb']
};

let state = {};

function updateSetupUI() {
    const mode = document.getElementById('mode').value;
    const isChord = mode.includes('build7th') || mode.includes('buildDom') || mode === 'buildTriad';
    document.getElementById('directionGroup').classList.toggle('hidden', isChord);
    document.getElementById('givenNoteGroup').classList.toggle('hidden', !isChord);
    document.getElementById('chordQualityGroup').classList.toggle('hidden', mode !== 'buildTriad');
    document.getElementById('difficultyGroup').classList.toggle('hidden', !mode.includes('build'));
    
    const instr = document.getElementById('setupInstructions');
    if(mode === 'buildDom') instr.innerHTML = "<b>Dominant 7th:</b> Spell the chord from the Root up. <br>Remember: Root - M3 - P5 - m7 (or M3 - m3 - m3).";
    else if(mode === 'build7th') instr.textContent = "Spell the diatonic 7th chord (white keys A-G) from the Root up.";
    else if(mode === 'buildTriad') instr.textContent = "Spell the exact triad from the root up including necessary accidentals.";
    else instr.textContent = "Exact theoretical spelling is required.";
}
document.getElementById('mode').addEventListener('change', updateSetupUI);
updateSetupUI();

function displayNote(n) { return n.replace(/#/g, '♯').replace(/b/g, '♭'); }

function noteToMidi(note) {
    const m = note.match(/^([A-G])(bb|b|##|#)?$/);
    const base = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1]];
    const offset = {'bb':-2,'b':-1,'':0,'#':1,'##':2}[m[2]||''];
    return (base + offset + 120) % 12;
}

function buildSpecificChord(start, position, intervals) {
    const m = start.match(/^([A-G])(bb|b|##|#)?$/);
    const startPitch = noteToMidi(start);
    const posIdx = ['Root','3rd','5th','7th'].indexOf(position);
    const rootPitch = (startPitch - intervals[posIdx] + 120) % 12;
    
    let rootLetterIdx = (LETTERS.indexOf(m[1]) - posIdx * 2);
    while(rootLetterIdx < 0) rootLetterIdx += 7;
    
    const chord = [];
    for(let i=0; i<intervals.length; i++) {
        const targetLetter = LETTERS[(rootLetterIdx + i*2) % 7];
        const targetPitch = (rootPitch + intervals[i]) % 12;
        const basePitch = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[targetLetter];
        let diff = (targetPitch - basePitch + 12) % 12;
        if(diff > 6) diff -= 12;
        const accMap = {'-2':'bb','-1':'b','0':'','1':'#','2':'##'};
        chord.push(targetLetter + accMap[diff]);
    }
    return chord;
}

function getValidPool() {
    const mode = state.mode;
    const pool = [];
    if(mode === 'buildDom') {
        const qualities = state.givenNote === 'random' ? ['Root','3rd','5th','7th'] : [state.givenNote];
        const starts = [...DISPLAY_ROWS.natural, 'Bb', 'Eb', 'Ab', 'Db', 'Gb', 'F#', 'C#'];
        starts.forEach(s => {
            qualities.forEach(q => {
                try {
                    const res = buildSpecificChord(s, q, [0,4,7,10]);
                    const keyRootPitch = (noteToMidi(res[0]) + 5) % 12;
                    const keyLetter = LETTERS[(LETTERS.indexOf(res[0].charAt(0)) + 3) % 7];
                    const baseK = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[keyLetter];
                    let kDiff = (keyRootPitch - baseK + 12) % 12; if(kDiff > 6) kDiff -= 12;
                    const keyName = keyLetter + {'-1':'b','0':'','1':'#'}[kDiff];
                    if(res.every(n => [...DISPLAY_ROWS.sharp, ...DISPLAY_ROWS.natural, ...DISPLAY_ROWS.flat].includes(n)) && keyName.length <= 2) {
                        pool.push({prompt: `Build the Dominant 7th chord where ${q} is ${displayNote(s)}`, answer: res, key: keyName + " Major"});
                    }
                } catch(e){}
            });
        });
    } else if(mode === 'build7th') {
        const qualities = state.givenNote === 'random' ? ['Root','3rd','5th','7th'] : [state.givenNote];
        LETTERS.forEach(s => qualities.forEach(q => {
            let rootIdx = (LETTERS.indexOf(s) - ['Root','3rd','5th','7th'].indexOf(q)*2);
            while(rootIdx < 0) rootIdx += 7;
            const res = [0,2,4,6].map(i => LETTERS[(rootIdx+i)%7]);
            pool.push({prompt: `Build the diatonic 7th chord where ${q} is ${s}`, answer: res});
        }));
    }
    return pool;
}

function getNoteOrder() {
    // Beginner or non-chord modes stay alphabetical
    if (state.difficulty === 'beginner' || !state.mode.includes('build')) return LETTERS;
    
    const orders = [
        ['F','C','G','D','A','E','B'], // 5ths
        ['B','E','A','D','G','C','F'], // 4ths
        ['G','F','E','D','C','B','A'], // Rev Alpha
        ['A','B','C','D','E','F','G'], // Std Alpha
        ['A','C','E','G','B','D','F'], // Inc 3rds
        ['F','D','B','G','E','C','A']  // Dec 3rds
    ];
    
    // Cycle based on completed count
    const choice = orders[state.completed % orders.length];
    return choice;
}

function renderAnswerArea() {
    const area = document.getElementById('answerArea');
    area.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'note-grid';

    if(state.stage === 'key') {
        const instr = document.createElement('div'); instr.className = 'instruction-note';
        instr.textContent = "What Major key includes this chord as the V7?";
        wrap.appendChild(instr);
        const keyGrid = document.createElement('div'); keyGrid.className = 'note-row';
        ['Cb','Gb','Db','Ab','Eb','Bb','F','C','G','D','A','E','B','F#','C#'].forEach(k => {
            const btn = document.createElement('button'); btn.className = 'note-btn'; btn.textContent = displayNote(k);
            btn.onclick = () => {
                if(k + " Major" === state.current.key) { btn.classList.add('correct-btn'); triggerAdvance(); }
                else { state.incorrect++; updateScore(); btn.classList.add('incorrect-btn'); setTimeout(() => btn.classList.remove('incorrect-btn'), 600); }
            };
            keyGrid.appendChild(btn);
        });
        keyGrid.style.gridTemplateColumns = "repeat(5, 1fr)";
        wrap.appendChild(keyGrid);
    } else {
        const instr = document.createElement('div'); instr.className = 'instruction-note';
        instr.textContent = "Say the name of the note as you select it.";
        wrap.appendChild(instr);

        if (state.mode === 'buildDom') {
            const formula = document.createElement('div');
            formula.className = 'formula-note';
            formula.textContent = 'Remember: Root - M3 - P5 - m7 (or M3 - m3 - m3).';
            wrap.appendChild(formula);
        }
        
        // Rows determined by mode
        const rowTypes = (state.mode === 'build7th' && state.difficulty === 'beginner') ? ['natural'] : ['sharp','natural','flat'];
        const currentOrder = getNoteOrder();

        rowTypes.forEach(r => {
            const row = document.createElement('div'); row.className = 'note-row';
            let notes = [...DISPLAY_ROWS[r]];
            
            // Apply the cyclic order to each row
            notes.sort((a,b) => currentOrder.indexOf(a.charAt(0)) - currentOrder.indexOf(b.charAt(0)));

            notes.forEach(n => {
                const btn = document.createElement('button'); btn.className = 'note-btn'; btn.textContent = displayNote(n);
                btn.onclick = () => {
                    if(state.answeredCorrectly) return;
                    state.currentInput.push(n); updateChordDisplay();
                    if(state.currentInput.length === state.current.answer.length) {
                        const isCorrect = state.currentInput.every((v,i) => v === state.current.answer[i]);
                        const slots = document.querySelectorAll('.chord-slot');
                        if(isCorrect) {
                            slots.forEach(s => s.classList.add('correct-text'));
                            if(state.difficulty === 'intermediate' && state.mode === 'buildDom') {
                                triggerMidAdvance();
                            } else triggerAdvance();
                        } else {
                            state.incorrect++; updateScore();
                            slots.forEach(s => s.classList.add('incorrect-text'));
                        }
                    }
                };
                row.appendChild(btn);
            });
            wrap.appendChild(row);
        });
        const clr = document.createElement('button'); clr.className = 'action-btn'; clr.textContent = '⌫ Clear';
        clr.onclick = () => { 
            state.currentInput = []; updateChordDisplay(); 
            document.querySelectorAll('.chord-slot').forEach(s => s.classList.remove('incorrect-text', 'correct-text'));
        };
        wrap.appendChild(clr);
    }
    area.appendChild(wrap);
}

function updateChordDisplay() {
    const disp = document.getElementById('chordInputDisplay'); disp.classList.remove('hidden');
    disp.innerHTML = state.current.answer.map((_,i) => `<div class="chord-slot ${state.currentInput[i]?'filled':''}">${displayNote(state.currentInput[i]||'_')}</div>`).join('');
}

function triggerMidAdvance() {
    state.answeredCorrectly = true;
    document.getElementById('answerArea').classList.add('no-pointer');
    document.getElementById('nextCue').classList.remove('hidden');
    const h = () => {
        document.removeEventListener('click', h);
        state.stage = 'key'; state.answeredCorrectly = false;
        document.getElementById('answerArea').classList.remove('no-pointer');
        document.getElementById('nextCue').classList.add('hidden');
        renderAnswerArea();
    };
    setTimeout(() => document.addEventListener('click', h), 10);
}

function triggerAdvance() {
    state.answeredCorrectly = true; state.completed++; updateScore();
    document.getElementById('answerArea').classList.add('no-pointer');
    document.getElementById('nextCue').classList.remove('hidden');
    const h = () => { document.removeEventListener('click', h); nextQ(); };
    setTimeout(() => document.addEventListener('click', h), 10);
}

function nextQ() {
    if(state.completed >= state.total) {
        document.getElementById('practiceCard').classList.add('hidden');
        document.getElementById('summaryCard').classList.remove('hidden');
        const attempts = state.completed + state.incorrect;
        document.getElementById('summary').innerHTML = `<h2>Complete!</h2><p>Accuracy: ${Math.round((state.completed/attempts)*100)}%</p>`;
    } else {
        state.current = state.queue.shift(); state.currentInput = []; state.answeredCorrectly = false; state.stage = 'build';
        document.getElementById('answerArea').classList.remove('no-pointer');
        document.getElementById('prompt').textContent = state.current.prompt;
        document.getElementById('nextCue').classList.add('hidden');
        renderAnswerArea(); updateChordDisplay();
    }
}

function updateScore() {
    document.getElementById('completed').textContent = state.completed;
    document.getElementById('incorrect').textContent = state.incorrect;
    const total = state.completed + state.incorrect;
    const acc = total === 0 ? 100 : Math.round((state.completed / total) * 100);
    document.getElementById('accuracy').textContent = acc + "%";
}

document.getElementById('startBtn').onclick = () => {
    state = { mode: document.getElementById('mode').value, difficulty: document.getElementById('difficulty').value, 
              givenNote: document.getElementById('givenNote').value, total: parseInt(document.getElementById('sessionLength').value),
              completed: 0, incorrect: 0, currentInput: [], stage: 'build', answeredCorrectly: false };
    const pool = getValidPool(); state.queue = [];
    while(state.queue.length < state.total) state.queue.push(...shuffle([...pool]));
    state.queue = state.queue.slice(0, state.total);
    document.getElementById('setupCard').classList.add('hidden');
    document.getElementById('practiceCard').classList.remove('hidden');
    updateScore(); nextQ();
};

document.getElementById('escapeBtn').onclick = () => location.reload();
document.getElementById('restartBtn').onclick = () => location.reload();
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
</script>
</body>
</html>
